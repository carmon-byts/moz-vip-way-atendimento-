<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>🇲🇿 MOZ VIP WAY 🇲🇿</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .welcome-screen {
      background-image: url('bg-mozvip.jpg');
      background-size: cover;
      background-position: center;
      height: 100vh;
      color: white;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      animation: fadeIn 2s ease-in-out;
    }

    .welcome-screen h1 {
      font-size: 4rem;
      font-weight: bold;
      margin-bottom: 30px;
      color: #fff;
      text-shadow: 1px 1px 4px #000;
    }

    .welcome-screen h2 {
      font-size: 2rem;
      margin: 0 20px 30px;
      background: rgba(0,0,0,0.6);
      padding: 20px;
      border-radius: 10px;
    }

    .botao-container {
      background-color: #007bff;
      padding: 30px;
      border-radius: 20px;
      display: flex;
      justify-content: center;
      gap: 40px;
      animation: slideUp 1s ease-in-out;
      max-width: 90%;
      margin: 0 auto;
      flex-wrap: wrap;
    }

    .botao-container button {
      background-color: #00cc66;
      padding: 20px 40px;
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .botao-container button:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="welcome-screen" id="welcome">
    <h1>🇲🇿 MOZ VIP WAY 🇲🇿</h1>
    <h2>📡 BEM VINDO/A NO SITE OFICIAL DE VENDAS DE ARQUIVOS PARA VPN'S 📡</h2>
    <div class="botao-container">
      <button onclick="mostrarFormulario()">Ir para Atendimento</button>
      <button onclick="window.location.href='comentarios.html'">Comentários</button>
    </div>
  </div>

  <script>
    function mostrarFormulario() {
      document.getElementById('welcome').style.display = 'none';
      document.getElementById('pagamento').style.display = 'block';
    }
  </script>
</body>
</html>
