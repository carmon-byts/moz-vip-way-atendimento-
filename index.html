<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>🇲🇿 MOZ VIP WAY 🇲🇿</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .welcome-screen {
      background-image: url('bg-mozvip-final.jpg');
      background-size: cover;
      background-position: center;
      height: 100vh;
      color: white;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      animation: fadeIn 2s ease-in-out;
      position: relative;
    }

    .welcome-screen h1 {
      font-size: 4rem;
      margin: 0 20px 30px;
      background: rgba(0, 0, 0, 0.6);
      padding: 25px;
      border-radius: 15px;
      font-weight: bold;
      text-shadow: 3px 3px 8px rgba(0, 0, 0, 0.8);
    }

    .welcome-screen button {
      padding: 20px 50px;
      font-size: 24px;
      background-color: #00cc66;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.3s;
      box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.3);
    }

    .welcome-screen button:hover {
      background-color: #00994d;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .online-count {
      position: absolute;
      top: 15px;
      right: 20px;
      background: rgba(0,0,0,0.5);
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      color: #00ff99;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: pulse 2s infinite;
    }

    .online-count i {
      font-style: normal;
      color: yellow;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
  </style>
</head>
<body>
  <div class="welcome-screen" id="welcome">
    <div class="online-count">
      <i>👥</i><span id="userCount">0</span> usuários online
    </div>
    <h1>⚠️ ATENÇÃO ⚠️<br>⭕ BEM-VINDO AO SITE OFICIAL DE VENDAS DE ARQUIVOS ⭕</h1>
    <button onclick="abrirComentarios()">Ver Comentários</button>
  </div>

  <script>
    // Simular número de usuários online variando entre 20 e 40
    function atualizarUsuarios() {
      const span = document.getElementById('userCount');
      let count = Math.floor(Math.random() * 21) + 20;
      span.innerText = count;
    }
    setInterval(atualizarUsuarios, 3000);
    atualizarUsuarios();

    function abrirComentarios() {
      // Animação suave para transição futura
      document.getElementById('welcome').style.opacity = '0';
      setTimeout(() => {
        window.location.href = 'comentarios.html'; // página de comentários
      }, 500);
    }
  </script>
</body>
</html>
