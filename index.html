<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>🇲🇿 MOZ VIP WAY 🇲🇿</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      overflow-x: hidden;
    }
    .welcome-screen, .comentarios-screen {
      width: 100%;
      height: 100vh;
      transition: opacity 1s ease-in-out, transform 1s ease-in-out;
      position: absolute;
      top: 0;
      left: 0;
    }
    .welcome-screen {
      background-image: url('bg-mozvip.jpg');
      background-size: cover;
      background-position: center;
      color: white;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      animation: fadeIn 2s ease-in-out;
    }
    .comentarios-screen {
      background-color: #fff;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .fadeOut {
      opacity: 0;
      transform: translateY(-100px);
      pointer-events: none;
    }
    .fadeIn {
      display: flex !important;
      opacity: 1;
      transform: translateY(0);
    }
    .welcome-screen h1 {
      font-size: 6rem;
      font-weight: bold;
      margin-bottom: 20px;
      margin-top: -40px;
      color: white;
      text-shadow: 2px 2px 10px #000, -2px -2px 10px #fff, 0 0 20px #00f;
      text-transform: uppercase;
      letter-spacing: 3px;
    }
    .promo-banner {
      font-size: 2.5rem;
      font-weight: bold;
      color: #ff4500;
      background-color: rgba(0, 0, 0, 0.7);
      padding: 15px 30px;
      border-radius: 12px;
      margin-top: 20px;
      animation: pulse 1.5s infinite;
      display: inline-block;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    .welcome-screen h2 {
      font-size: 2rem;
      margin: 0 20px 30px;
      background: rgba(0, 0, 0, 0.6);
      padding: 20px;
      border-radius: 10px;
    }
    .welcome-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }
    .welcome-buttons button {
      padding: 35px 70px;
      font-size: 28px;
      background-color: #007bff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }
    .online-counter {
      position: absolute;
      top: 10px;
      right: 15px;
      background-color: #222;
      color: #0f0;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 0 10px #0f0;
    }
    .links-uteis {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 35px 0;
      background-color: rgba(0, 0, 0, 0.8);
      text-align: center;
    }
    .links-uteis h3 {
      font-size: 28px;
      color: yellow;
      margin-bottom: 25px;
      font-weight: bold;
    }
    .grupo-button, .config-button, .telegram-button {
      background-color: #007bff;
      color: white;
      font-weight: bold;
      font-size: 22px;
      padding: 14px 30px;
      border-radius: 12px;
      margin: 12px 8px;
      cursor: pointer;
      border: none;
    }
    .links-uteis p {
      font-size: 22px;
      font-weight: bold;
      color: red;
      margin-top: 30px;
      text-shadow: 1px 1px 5px #000;
    }
    .comentarios-screen h2 {
      font-size: 2.5rem;
      color: #007bff;
      margin-bottom: 20px;
    }
    .comentarios-screen textarea {
      width: 90%;
      height: 150px;
      padding: 15px;
      font-size: 18px;
      border-radius: 8px;
      border: 2px solid #007bff;
      margin-bottom: 20px;
    }
    .comentarios-screen button {
      font-size: 22px;
      padding: 15px 35px;
      border: none;
      border-radius: 10px;
      background-color: #28a745;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .comentarios-screen .voltar-btn {
      background-color: #ff4444;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="welcome-screen" id="welcome">
    <div class="online-counter">
      <span>🟢</span>
      <span id="online-number">38</span> online
    </div>
    <h1>🇲🇿 MOZ VIP WAY 🇲🇿</h1>
    <div class="promo-banner">🔥 PROMOÇÃO ÚNICA 🔥</div>
    <h2>📡 BEM VINDO/A NO SITE OFICIAL DE VENDAS DE ARQUIVOS PARA VPN'S 📡</h2>
    <div class="welcome-buttons">
      <button onclick="mostrarFormulario()">💬 Ir para Atendimento</button>
      <button onclick="irParaComentarios()">⭐ Comentários</button>
    </div>
    <div class="links-uteis">
      <h3>🔗 Links Úteis:</h3>
      <button class="grupo-button" onclick="window.open('https://chat.whatsapp.com/G0TvarzpXWQ3OIo3K7WWaJ', '_blank')">💬 Grupo de WhatsApp</button>
      <button class="config-button" onclick="window.open('https://wa.link/7np01p', '_blank')">🔒 Configuração Privada</button>
      <button class="telegram-button" onclick="window.open('https://t.me/MOZVIPWEY', '_blank')">📢 Grupo de Telegram</button>
      <p>⚠️ A sua segurança é a minha prioridade ⚠️</p>
    </div>
  </div>

  <div class="comentarios-screen" id="comentarios">
    <h2>⭐ Deixe o seu comentário</h2>
    <textarea placeholder="Escreva o seu comentário aqui..."></textarea>
    <button onclick="enviarComentario()">📨 Enviar Comentário</button>
    <button class="voltar-btn" onclick="voltarInicio()">🔙 Voltar</button>
  </div>

  <script>
    function irParaComentarios() {
      const welcome = document.getElementById('welcome');
      const comentarios = document.getElementById('comentarios');
      welcome.classList.add('fadeOut');
      setTimeout(() => {
        welcome.style.display = 'none';
        comentarios.classList.add('fadeIn');
        comentarios.style.display = 'flex';
      }, 1000);
    }

    function voltarInicio() {
      const welcome = document.getElementById('welcome');
      const comentarios = document.getElementById('comentarios');
      comentarios.classList.remove('fadeIn');
      comentarios.style.display = 'none';
      welcome.style.display = 'flex';
      welcome.classList.remove('fadeOut');
    }

    function enviarComentario() {
      const comentario = document.querySelector('.comentarios-screen textarea').value;
      
      if (comentario.trim() === "") {
        alert("Por favor, escreva um comentário.");
        return;
      }
      
      const formData = new FormData();
      formData.append("comentario", comentario);

      fetch('https://formspree.io/f/mwkwvzen', {
        method: 'POST',
        body: formData,
      })
      .then(response => response.json())
      .then(data => {
        alert("Comentário enviado com sucesso!");
        document.querySelector('.comentarios-screen textarea').value = '';
      })
      .catch(error => {
        alert("Houve um erro ao enviar o comentário. Tente novamente.");
      });
    }

    setInterval(() => {
      const numeroAleatorio = Math.floor(Math.random() * (58 - 18 + 1)) + 18;
      document.getElementById("online-number").textContent = numeroAleatorio;
    }, 4000);
  </script>
</body>
</html>
