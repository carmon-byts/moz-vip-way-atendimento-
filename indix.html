<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>🇲🇿 MOZ VIP WAY 🇲🇿</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .welcome-screen {
      background-image: url('bg-mozvip-final.jpg');
      background-size: cover;
      background-position: center;
      height: 100vh;
      color: white;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      animation: fadeIn 2s ease-in-out;
      position: relative;
    }

    h1 {
      font-size: 3.5rem;
      margin: 0 20px 30px;
      background: rgba(0,0,0,0.6);
      padding: 30px;
      border-radius: 15px;
      font-weight: bold;
      text-shadow: 2px 2px 10px black;
    }

    .welcome-screen button {
      padding: 20px 40px;
      font-size: 22px;
      margin: 10px;
      background-color: #00cc66;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease, background-color 0.3s ease;
    }

    .welcome-screen button:hover {
      background-color: #00994d;
      transform: scale(1.08);
    }

    /* Animação fade-in */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Usuários online */
    .online-counter {
      position: absolute;
      top: 15px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .online-icon {
      background-color: #00ff55;
      border-radius: 50%;
      width: 12px;
      height: 12px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="welcome-screen" id="welcome">
    <div class="online-counter">
      <span class="online-icon"></span>
      <span id="userCount">...</span> usuários online
    </div>

    <h1>⚠️ ATENÇÃO ⚠️<br>⭕ BEM-VINDO AO SITE OFICIAL DE VENDAS DE ARQUIVOS ⭕</h1>

    <button onclick="navegarPara('atendimento')">Ir para Atendimento</button>
    <button onclick="navegarPara('comentarios')">Comentários</button>
    <button onclick="navegarPara('precos')">Tabela de Preços</button>
  </div>

  <script>
    // Número de usuários online entre 20 e 40 com atualização a cada 3 segundos
    function atualizarUsuarios() {
      const numero = Math.floor(Math.random() * 21) + 20;
      document.getElementById("userCount").textContent = numero;
    }
    setInterval(atualizarUsuarios, 3000);
    atualizarUsuarios();

    // Simulação de animação ao clicar nos botões
    function navegarPara(destino) {
      alert('Redirecionando para ' + destino + '... (em desenvolvimento)');
      // Aqui você pode usar: window.location.href = destino.html;
    }
  </script>
</body>
</html>
